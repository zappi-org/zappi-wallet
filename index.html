<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#F8F9FC" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- default, not black-translucent: the translucent mode is deprecated and its
         full-bleed geometry (screen height incl. status bar) randomly collapses to
         the non-bleed size across keyboard/relaunch cycles, leaving a dead band at
         the bottom (measured 896→852 on device). default mode is the stable
         non-bleed geometry anchored to the screen bottom — no band possible. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ZAPPI Wallet" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Google Fonts: Outfit (primary) + Montserrat (display/amounts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>ZAPPI Wallet</title>
  </head>
  <body>
    <div id="root">
      <!-- Inline fallback UI (shown before JS loads or on offline) -->
      <style>
        .pwa-loading {
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #F8F9FC;
          color: #1D1D1F;
          font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .pwa-loading-content { text-align: center; }
        .pwa-loading-title {
          font-size: 2rem;
          font-weight: bold;
          letter-spacing: -0.05em;
          color: #515AC0;
        }
        .pwa-loading-subtitle {
          font-size: 0.875rem;
          opacity: 0.6;
          margin-top: 0.5rem;
        }
      </style>
      <div class="pwa-loading">
        <div class="pwa-loading-content">
          <div class="pwa-loading-title">ZAPPI</div>
          <div class="pwa-loading-subtitle">로딩 중...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        if (document.querySelector('.pwa-loading')) {
          var sub = document.querySelector('.pwa-loading-subtitle');
          if (sub) {
            sub.textContent = navigator.onLine
              ? 'Loading failed. Please refresh.'
              : 'Please connect to the internet and reopen the app.';
          }
        }
      }, 8000);
    </script>
  </body>
</html>
