worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Crawler detection. Matched against User-Agent header.
    # Bots parse the HTML for OG meta tags; humans want the PWA shell.
    map $http_user_agent $is_bot {
        default 0;
        ~*bot 1;
        ~*facebookexternalhit 1;
        ~*twitterbot 1;
        ~*discordbot 1;
        ~*slackbot 1;
        ~*telegrambot 1;
        ~*linkedinbot 1;
        ~*embedly 1;
        ~*quora 1;
        ~*skypeuripreview 1;
        ~*pinterest 1;
        ~*vkshare 1;
        ~*whatsapp 1;
        ~*applebot 1;
        ~*googlebot 1;
        ~*bingbot 1;
        ~*yandex 1;
        ~*baiduspider 1;
    }

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/manifest+json;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Service Worker files - must NOT be cached aggressively.
        # Browser must always revalidate to detect SW updates.
        # Regex location blocks are matched in config order (first match wins).
        location ~ ^/(service-worker|sw|workbox-).*\.js$ {
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }

        # Vite hashed assets (assets/) - safe to cache forever
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Non-hashed static files (public/ copies like images, icons) - revalidate
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=3600, must-revalidate";
            try_files $uri =404;
        }

        # Open Graph image (server-assets, never bundled into client build).
        # Bots crawl this URL after parsing the OG meta tags from / for crawlers.
        # `alias` without trailing slash replaces the matched URI in full,
        # so /og-open-beta.png → /usr/share/nginx/server-assets/og-open-beta.png.
        location = /og-open-beta.png {
            alias /usr/share/nginx/server-assets/og-open-beta.png;
            add_header Cache-Control "public, max-age=3600, must-revalidate" always;
            default_type image/png;
        }

        # SPA root: bots get the static OG meta HTML for link previews,
        # humans get the PWA shell. Bots ignore SPA JS so we hand them a
        # plain document; humans must still hit the React app.
        #
        # Implementation: rewrite the URI to /bot.html for crawler UAs.
        # `if` is safe here because it does a single rewrite to a `last` location;
        # nginx's "IfIsEvil" page explicitly blesses this pattern for UA-based
        # branching. The rewritten URI then matches `location = /bot.html` below,
        # which has its own root pointing at server-assets.
        location = / {
            if ($is_bot) {
                rewrite ^ /bot.html last;
            }
            try_files $uri $uri/ /index.html;
        }

        # Bot-only OG HTML. Internally rewritten from / when UA matches a crawler.
        # Root switched to server-assets so the file is never in the client bundle.
        # `sub_filter` injects the request Host so the same file works for
        # wallet.zappi.space, wallet-staging.zappi.space, wallet-nightly.zappi.space.
        location = /bot.html {
            root /usr/share/nginx/server-assets;
            add_header Content-Type "text/html; charset=utf-8" always;
            add_header Cache-Control "public, max-age=300" always;
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter '__HOST__' $host;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
